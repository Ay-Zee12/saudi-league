<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Scorers — Saudi Pro League 2025-26</title>
  <meta name="description"
    content="Top goal scorers of the Saudi Pro League 2025-26 season featuring the league's biggest stars." />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>" />
</head>

<body>

  <nav class="navbar">
    <div class="nav-content">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon">SPL</div>
        <div class="nav-logo-text">Saudi <span>Pro League</span></div>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="standings.html">Standings</a></li>
        <li><a href="results.html">Results</a></li>
        <li><a href="scorers.html">Top Scorers</a></li>
        <li><a href="assists.html">Top Assists</a></li>
      </ul>
      <button class="nav-mobile-toggle" id="mobileToggle" aria-label="Toggle navigation">☰</button>
      <div class="lang-switcher">
        <button id="langToggle" class="lang-btn">
          <span class="lang-icon">🌐</span>
          <span class="lang-text">Arabic</span>
        </button>
      </div>
    </div>
  </nav>

  <main>
    <div class="page-header fade-in">
      <h1 class="page-title"><span data-i18n="topScorers">⚽ Top Scorers</span></h1>
      <p class="page-subtitle"><span data-i18n="leadingGoalScorers">Leading goal scorers of the 2025-26 season</span>
      </p>
    </div>

    <!-- Leader Spotlight -->
    <section class="fade-in" id="leaderSpotlight"></section>

    <section class="fade-in">
      <div class="stats-grid stagger-children" id="scorersGrid"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <p>© 2025 <span class="accent" data-i18n="title">Saudi Pro League</span> <span data-i18n="footerText">Stats
          Tracker — All data for illustration purposes.</span></p>
      <p style="margin-top: 5px; opacity: 0.8; font-size: 0.9em;"><span data-i18n="madeBy">Made By</span> <span
          class="accent">Hatosy</span></p>
    </div>
  </footer>

  <script src="i18n.js"></script>
  <script src="logos.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Leader spotlight
      const leader = TOP_SCORERS[0];
      const spotlight = document.getElementById("leaderSpotlight");
      spotlight.innerHTML = `
        <div class="leader-card">
          <div class="leader-crown">👑</div>
          ${playerImageHTML(leader.name, 100)}
          <div class="leader-info">
            <div class="leader-label">${currentLang === 'ar' ? 'متصدر الحذاء الذهبي' : 'Golden Boot Leader'}</div>
            <div class="leader-name">${leader.nationality} ${translatePlayer(leader.name)}</div>
            <div class="leader-team">
              ${teamBadgeHTML(leader.team, 24)}
              <span>${translateTeam(leader.team)} · ${leader.matches} ${i18n("matches")}</span>
            </div>
          </div>
          <div class="leader-stat">
            <div class="leader-stat-value">${leader.goals}</div>
            <div class="leader-stat-label">${i18n("goals")}</div>
          </div>
        </div>
      `;

      // Full list
      const grid = document.getElementById("scorersGrid");
      grid.innerHTML = TOP_SCORERS.map((p, i) => {
        const rank = i + 1;
        let rankClass = rank === 1 ? "rank-1" : rank === 2 ? "rank-2" : rank === 3 ? "rank-3" : "";

        return `
          <div class="player-card ${rankClass}">
            <div class="player-rank">${rank}</div>
            ${playerImageHTML(p.name, 48)}
            <div class="player-info">
              <div class="player-name">
                <span class="player-nationality">${p.nationality}</span>
                ${translatePlayer(p.name)}
              </div>
              <div class="player-team">
                ${teamBadgeHTML(p.team, 16)}
                <span>${translateTeam(p.team)} · ${p.matches} ${i18n("matches")}</span>
              </div>
            </div>
            <div class="player-stat">
              <div class="player-stat-value">${p.goals}</div>
              <div class="player-stat-label">${i18n("goals")}</div>
            </div>
          </div>`;
      }).join("");

      // Update sidebar/nav links
      document.querySelectorAll(".nav-links a").forEach((link, i) => {
        const navLinks = ["home", "standings", "results", "scorers", "assists"];
        if (navLinks[i]) {
          link.setAttribute("data-i18n", navLinks[i]);
          link.textContent = i18n(navLinks[i]);
        }
      });
    });
  </script>
</body>

</html>
