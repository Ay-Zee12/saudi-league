<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Match Results — Saudi Pro League 2025-26</title>
    <meta name="description" content="Latest Saudi Pro League 2025-26 match results and scores across all matchdays." />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>" />
</head>

<body>

    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" class="nav-logo">
                <div class="nav-logo-icon">SPL</div>
                <div class="nav-logo-text">Saudi <span>Pro League</span></div>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="standings.html">Standings</a></li>
                <li><a href="results.html">Results</a></li>
                <li><a href="scorers.html">Top Scorers</a></li>
                <li><a href="assists.html">Top Assists</a></li>
            </ul>
            <button class="nav-mobile-toggle" id="mobileToggle" aria-label="Toggle navigation">☰</button>
            <div class="lang-switcher">
                <button id="langToggle" class="lang-btn">
                    <span class="lang-icon">🌐</span>
                    <span class="lang-text">Arabic</span>
                </button>
            </div>
        </div>
    </nav>

    <main>
        <div class="page-header fade-in">
            <h1 class="page-title"><span data-i18n="matchResults">📋 Match Results</span></h1>
            <p class="page-subtitle"><span data-i18n="allMatchdays">All match scores from the 2025-26 season</span></p>
        </div>

        <section class="fade-in">
            <div class="matchday-filter" id="matchdayFilter"></div>
            <div class="results-grid stagger-children" id="resultsGrid"></div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>© 2025 <span class="accent" data-i18n="title">Saudi Pro League</span> <span data-i18n="footerText">Stats
                    Tracker — All data for illustration purposes.</span></p>
            <p style="margin-top: 5px; opacity: 0.8; font-size: 0.9em;"><span data-i18n="madeBy">Made By</span> <span
                    class="accent">Hatosy</span></p>
        </div>
    </footer>

    <script src="i18n.js"></script>
    <script src="logos.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            renderResults("all");

            function renderResults(filterMatchday) {
                const grid = document.getElementById("resultsGrid");
                const filter = document.getElementById("matchdayFilter");
                const matchdays = [...new Set(RESULTS.map(r => r.matchday))].sort((a, b) => b - a);

                filter.innerHTML = `
          <button class="matchday-btn ${filterMatchday === "all" ? "active" : ""}" data-md="all">${i18n("allMatchdays")}</button>
          ${matchdays.map(md =>
                    `<button class="matchday-btn ${filterMatchday === md ? "active" : ""}" data-md="${md}">${i18n("matchday")} ${md}</button>`
                ).join("")}
        `;

                filter.querySelectorAll(".matchday-btn").forEach(btn => {
                    btn.addEventListener("click", () => {
                        const md = btn.dataset.md;
                        renderResults(md === "all" ? "all" : parseInt(md));
                    });
                });

                const filtered = filterMatchday === "all"
                    ? RESULTS
                    : RESULTS.filter(r => r.matchday === filterMatchday);

                grid.innerHTML = filtered.map(r => {
                    const homeWin = r.homeScore > r.awayScore;
                    const awayWin = r.awayScore > r.homeScore;
                    const dateStr = new Date(r.date).toLocaleDateString(currentLang === "ar" ? "ar-SA" : "en-US", { month: "short", day: "numeric", year: "numeric" });

                    return `
            <div class="result-card">
              <div class="result-matchday">
                <span>${i18n("matchday")} ${r.matchday}</span>
                <span class="result-date">${dateStr}</span>
              </div>
              <div class="result-body">
                <div class="result-team">
                  ${teamBadgeHTML(r.home, 30)}
                  <span class="result-team-name">${translateTeam(r.home)}</span>
                </div>
                <div class="result-score">
                  <span class="score-home ${homeWin ? 'winner' : ''}">${r.homeScore}</span>
                  <span class="divider">–</span>
                  <span class="score-away ${awayWin ? 'winner' : ''}">${r.awayScore}</span>
                </div>
                <div class="result-team away">
                  ${teamBadgeHTML(r.away, 30)}
                  <span class="result-team-name">${translateTeam(r.away)}</span>
                </div>
              </div>
            </div>`;
                }).join("");

                grid.classList.remove("visible");
                requestAnimationFrame(() => grid.classList.add("visible"));
            }

            // Update sidebar/nav links
            document.querySelectorAll(".nav-links a").forEach((link, i) => {
                const navLinks = ["home", "standings", "results", "scorers", "assists"];
                if (navLinks[i]) {
                    link.setAttribute("data-i18n", navLinks[i]);
                    link.textContent = i18n(navLinks[i]);
                }
            });
        });
    </script>
</body>

</html>
